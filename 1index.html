<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>German Auto Service Invoice Builder</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    color:#111;
}

#root{
    min-height:100vh;
}

/* TOP BAR */
.topbar{
    background:linear-gradient(135deg,#111,#1d1d1d);
    padding:18px 20px;
    position:sticky;
    top:0;
    z-index:1000;
    overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
}

.shop-name{
    color:white;
    font-size:30px;
    font-weight:900;
    text-align:center;
    letter-spacing:2px;
    margin-top:10px;
}

.shop-phone{
    color:rgba(255,255,255,0.75);
    text-align:center;
    margin-top:8px;
    font-size:14px;
    letter-spacing:1px;
}

/* LOGO ANIMATION */
.logo-wrap{
    overflow:hidden;
    white-space:nowrap;
}

.logo-slider{
    display:inline-flex;
    align-items:center;
    gap:40px;
    animation:slide 28s linear infinite;
}

.logo-slider img{
    height:34px;
    width:auto;
    filter:brightness(0) invert(1);
    opacity:0.92;
}

@keyframes slide{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(-50%);
    }
}

.container{
    max-width:850px;
    margin:25px auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.section-title{
    font-size:13px;
    font-weight:800;
    letter-spacing:2px;
    margin-bottom:18px;
    color:#666;
}

.grid{
    display:grid;
    gap:14px;
}

.grid-2{
    grid-template-columns:1fr 1fr;
}

.grid-3{
    grid-template-columns:1fr 1fr 1fr;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:15px;
    outline:none;
}

textarea{
    min-height:90px;
    resize:vertical;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:12px;
    font-weight:700;
    color:#777;
    letter-spacing:1px;
}

.service-box{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:14px;
    padding:16px;
    position:relative;
}

.remove-btn{
    position:absolute;
    right:10px;
    top:10px;
    width:30px;
    height:30px;
    border-radius:50%;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
}

.add-btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:2px dashed #bbb;
    background:white;
    cursor:pointer;
    font-weight:700;
}

.preview-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
}

.invoice{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 5px 18px rgba(0,0,0,0.1);
}

.invoice-header{
    background:#111;
    color:white;
    padding:28px;
    text-align:center;
}

.invoice-title{
    font-size:38px;
    font-weight:900;
    margin-top:10px;
}

.invoice-body{
    padding:24px;
}

.total-box{
    background:#111;
    color:white;
    padding:18px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    font-weight:800;
    margin-top:20px;
}

.print-logo-bar{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-bottom:18px;
}

.print-logo-bar img{
    height:30px;
}

.service-row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.top-buttons{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
}

.action-btn{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
}

.back-btn{
    background:white;
    border:1px solid #ddd;
}

.print-btn{
    background:#111;
    color:white;
}

@media(max-width:768px){

    .grid-2,
    .grid-3{
        grid-template-columns:1fr;
    }

    .shop-name{
        font-size:22px;
    }

    .invoice-title{
        font-size:28px;
    }

    .logo-slider img{
        height:26px;
    }
}

@media print{

    .topbar,
    .top-buttons{
        display:none !important;
    }

    body{
        background:white;
    }

    .container{
        margin:0;
        max-width:100%;
    }

    .invoice{
        box-shadow:none;
    }
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

const SERVICES = [
    ["Oil Change",40],
    ["Synthetic Oil Change",75],
    ["Brake Pads Front",120],
    ["Brake Pads Rear",120],
    ["Brake Rotors",150],
    ["Wheel Alignment",80],
    ["Battery Replacement",120],
    ["Alternator Replacement",250],
    ["Starter Replacement",220],
    ["A/C Recharge",120],
    ["Engine Diagnostic",80],
    ["Custom Service",0]
];

const logos = [
"https://upload.wikimedia.org/wikipedia/commons/9/90/Mercedes-Logo.svg",
"https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg",
"https://upload.wikimedia.org/wikipedia/commons/7/78/Toyota_logo.svg",
"https://upload.wikimedia.org/wikipedia/commons/3/3e/Audi_logo_detail.svg",
"https://upload.wikimedia.org/wikipedia/commons/6/6f/Logo_of_Ford_Motor_Company.svg",
"https://upload.wikimedia.org/wikipedia/commons/c/cc/Honda-logo.svg",
"https://upload.wikimedia.org/wikipedia/commons/9/92/Volkswagen_logo_2019.svg"
];

function newRow(){
    return{
        id:Date.now()+Math.random(),
        service:"",
        note:"",
        rate:""
    };
}

function App(){

    const [view,setView]=useState("form");

    const [client,setClient]=useState("");
    const [phone,setPhone]=useState("");
    const [email,setEmail]=useState("");

    const [year,setYear]=useState("");
    const [make,setMake]=useState("");
    const [model,setModel]=useState("");

    const [invoice,setInvoice]=useState("001");

    const [rows,setRows]=useState([newRow()]);

    const [notes,setNotes]=useState("");

    const addRow=()=>{
        setRows([...rows,newRow()]);
    };

    const removeRow=(id)=>{
        setRows(rows.filter(r=>r.id!==id));
    };

    const updateRow=(id,key,val)=>{
        setRows(rows.map(r=>{
            if(r.id!==id) return r;

            const updated={...r,[key]:val};

            if(key==="service"){
                const found=SERVICES.find(s=>s[0]===val);
                if(found){
                    updated.rate=found[1];
                }
            }

            return updated;
        }));
    };

    const subtotal=rows.reduce((sum,r)=>sum+(parseFloat(r.rate)||0),0);

    const fmt=n=>"$"+n.toFixed(2);

    if(view==="preview"){
        return(
            <div className="container">

                <div className="top-buttons">
                    <button className="action-btn back-btn" onClick={()=>setView("form")}>
                        ← Back
                    </button>

                    <button className="action-btn print-btn" onClick={()=>window.print()}>
                        Print Invoice
                    </button>
                </div>

                <div className="invoice">

                    <div className="invoice-header">

                        <div className="print-logo-bar">
                            <img src={logos[0]} />
                            <img src={logos[1]} />
                            <img src={logos[3]} />
                            <img src={logos[6]} />
                        </div>

                        <div className="invoice-title">
                            German Auto Service
                        </div>

                        <div style={{marginTop:"10px",opacity:0.8}}>
                            703-980-6349
                        </div>

                    </div>

                    <div className="invoice-body">

                        <div className="grid grid-2" style={{marginBottom:"25px"}}>

                            <div>
                                <h3>Client</h3>
                                <div style={{marginTop:"10px"}}>{client}</div>
                                <div>{phone}</div>
                                <div>{email}</div>
                            </div>

                            <div style={{textAlign:"right"}}>
                                <h3>Invoice #{invoice}</h3>
                                <div>{year} {make} {model}</div>
                            </div>

                        </div>

                        <div>
                            {rows.map(r=>(
                                <div className="service-row" key={r.id}>
                                    <div>
                                        <div>{r.service}</div>
                                        <div style={{fontSize:"12px",color:"#777"}}>
                                            {r.note}
                                        </div>
                                    </div>

                                    <div>
                                        {fmt(parseFloat(r.rate)||0)}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="total-box">
                            <span>Total</span>
                            <span>{fmt(subtotal)}</span>
                        </div>

                        {notes && (
                            <div style={{marginTop:"25px"}}>
                                <h3>Notes</h3>
                                <div style={{marginTop:"8px",color:"#555"}}>
                                    {notes}
                                </div>
                            </div>
                        )}

                    </div>

                </div>

            </div>
        );
    }

    return(
        <div>

            <div className="topbar">

                <div className="logo-wrap">
                    <div className="logo-slider">

                        {logos.concat(logos).map((logo,i)=>(
                            <img src={logo} key={i}/>
                        ))}

                    </div>
                </div>

                <div className="shop-name">
                    German Auto Service
                </div>

                <div className="shop-phone">
                    703-980-6349
                </div>

            </div>

            <div className="container">

                <div className="card">

                    <div className="section-title">
                        INVOICE INFO
                    </div>

                    <div className="grid grid-3">

                        <div>
                            <label>Invoice #</label>
                            <input
                                value={invoice}
                                onChange={e=>setInvoice(e.target.value)}
                            />
                        </div>

                        <div>
                            <label>Year</label>
                            <input
                                value={year}
                                onChange={e=>setYear(e.target.value)}
                            />
                        </div>

                        <div>
                            <label>Make / Model</label>
                            <input
                                placeholder="BMW M5"
                                value={`${make} ${model}`}
                                onChange={e=>{
                                    const parts=e.target.value.split(" ");
                                    setMake(parts[0]||"");
                                    setModel(parts.slice(1).join(" "));
                                }}
                            />
                        </div>

                    </div>

                </div>

                <div className="card">

                    <div className="section-title">
                        CLIENT
                    </div>

                    <div className="grid grid-2">

                        <div>
                            <label>Client Name</label>
                            <input
                                value={client}
                                onChange={e=>setClient(e.target.value)}
                            />
                        </div>

                        <div>
                            <label>Phone</label>
                            <input
                                value={phone}
                                onChange={e=>setPhone(e.target.value)}
                            />
                        </div>

                    </div>

                    <div style={{marginTop:"14px"}}>
                        <label>Email</label>
                        <input
                            value={email}
                            onChange={e=>setEmail(e.target.value)}
                        />
                    </div>

                </div>

                <div className="card">

                    <div className="section-title">
                        SERVICES
                    </div>

                    {rows.map((row,index)=>(

                        <div className="service-box" key={row.id}>

                            {rows.length>1 && (
                                <button
                                    className="remove-btn"
                                    onClick={()=>removeRow(row.id)}
                                >
                                    ×
                                </button>
                            )}

                            <label>Service</label>

                            <select
                                value={row.service}
                                onChange={e=>updateRow(row.id,"service",e.target.value)}
                            >
                                <option value="">Select Service</option>

                                {SERVICES.map(s=>(
                                    <option key={s[0]} value={s[0]}>
                                        {s[0]}
                                    </option>
                                ))}

                            </select>

                            <div style={{marginTop:"12px"}}>

                                <label>Notes</label>

                                <input
                                    value={row.note}
                                    onChange={e=>updateRow(row.id,"note",e.target.value)}
                                />

                            </div>

                            <div style={{marginTop:"12px"}}>

                                <label>Price</label>

                                <input
                                    value={row.rate}
                                    onChange={e=>updateRow(row.id,"rate",e.target.value)}
                                />

                            </div>

                        </div>

                    ))}

                    <div style={{marginTop:"14px"}}>
                        <button className="add-btn" onClick={addRow}>
                            + Add Service
                        </button>
                    </div>

                </div>

                <div className="card">

                    <div className="section-title">
                        NOTES
                    </div>

                    <textarea
                        value={notes}
                        onChange={e=>setNotes(e.target.value)}
                    />

                    <div className="total-box">
                        <span>Total</span>
                        <span>{fmt(subtotal)}</span>
                    </div>

                </div>

                <button
                    className="preview-btn"
                    onClick={()=>setView("preview")}
                >
                    Preview Invoice
                </button>

            </div>

        </div>
    );
}

const root=ReactDOM.createRoot(document.getElementById("root"));

root.render(<App/>);

</script>

</body>
</html>
