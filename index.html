<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>German Auto Invoice Builder</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Georgia, serif;
  background:#f7f5f2;
  color:#1a1a1a;
}

#root { min-height:100vh; }

/* FIXED LOGO RENDERING */
.invoice-logo {
  height:34px;
  width:auto;
  object-fit:contain;
  display:block;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* TOP SCROLLING LOGO BAR */
.logo-bar {
  display:flex;
  gap:25px;
  overflow:hidden;
  white-space:nowrap;
  background:#111;
  padding:10px;
}

.logo-bar img {
  height:28px;
  filter: brightness(1);
}

/* PRINT FIX */
@media print {
  body { background:#fff !important; }

  button { display:none !important; }

  .logo-bar {
    display:flex !important;
    flex-wrap:nowrap;
  }

  .invoice-logo {
    display:block !important;
  }

  @page { margin:10mm; }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

/* FIXED PNG LOGOS (PRINT SAFE) */
const CAR_BRANDS = [
  { name:"Mercedes", logo:"https://logo.clearbit.com/mercedes-benz.com" },
  { name:"BMW", logo:"https://logo.clearbit.com/bmw.com" },
  { name:"Audi", logo:"https://logo.clearbit.com/audi.com" },
  { name:"Toyota", logo:"https://logo.clearbit.com/toyota.com" },
  { name:"Ford", logo:"https://logo.clearbit.com/ford.com" },
  { name:"Honda", logo:"https://logo.clearbit.com/honda.com" },
];

function InvoiceApp() {

  const [view,setView]=useState("form");
  const [discount,setDiscount]=useState(0);

  const subtotal=100; // placeholder for now

  const total=subtotal - (subtotal*discount/100);

  /* TOP BAR */
  const LogoBar = () => (
    <div className="logo-bar">
      {CAR_BRANDS.map(b=>(
        <img key={b.name} src={b.logo} />
      ))}
    </div>
  );

  if(view==="preview"){
    return (
      <div>

        <LogoBar />

        <button onClick={()=>setView("form")}>Back</button>
        <button onClick={()=>window.print()}>Print</button>

        <div style={{padding:20, background:"#fff", margin:20}}>

          <h1>German Auto Service</h1>
          <p>(703) 980-6349</p>

          <hr/>

          <h2>Invoice</h2>

          <label>Global Discount %</label>
          <input
            type="number"
            value={discount}
            onChange={e=>setDiscount(e.target.value)}
          />

          <h3>Subtotal: ${subtotal}</h3>
          <h2>Total: ${total}</h2>

        </div>
      </div>
    );
  }

  return (
    <div>

      <LogoBar />

      <button onClick={()=>setView("preview")}>
        Preview
      </button>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root"))
.render(<InvoiceApp/>);

</script>
</body>
</html>
