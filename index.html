<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Auto Invoice Builder</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Georgia', serif; background: #f7f5f2; color: #1a1a1a; }
        #root { min-height: 100vh; }
        @media print {
            body { background: white; }
            button { display: none !important; }
            textarea, input, select { border: none !important; background: transparent !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Reliable Logo List
        const LOGO_LIST = [
            "https://www.carlogos.org/logo/BMW-logo.png",
            "https://www.carlogos.org/logo/Mercedes-Benz-logo.png",
            "https://www.carlogos.org/logo/Lexus-logo.png",
            "https://www.carlogos.org/logo/Land-Rover-logo.png",
            "https://www.carlogos.org/logo/Honda-logo.png",
            "https://www.carlogos.org/logo/Toyota-logo.png"
        ];

        const COMMON_SERVICES = [
            { label: "Oil Change & Filter", defaultRate: 40 },
            { label: "Synthetic Oil Change & Filter", defaultRate: 75 },
            { label: "Brake Pad Replacement", defaultRate: 120 },
            { label: "Brake Rotor Replacement", defaultRate: 150 },
            { label: "Brake Fluid Flush", defaultRate: 60 },
            { label: "Tire Rotation", defaultRate: 25 },
            { label: "Wheel Alignment", defaultRate: 80 },
            { label: "Battery Replacement", defaultRate: 80 },
            { label: "Engine Diagnostic", defaultRate: 60 },
            { label: "A/C Recharge", defaultRate: 100 },
            { label: "Labor – General (per hour)", defaultRate: 75 },
            { label: "Custom / Other", defaultRate: 0 },
        ];

        const initialRow = () => ({
            id: Date.now() + Math.random(),
            selected: "",
            custom: "",
            rate: "",
            note: ""
        });

        function InvoiceApp() {
            const [view, setView] = useState("form");
            const [invoiceNum, setInvoiceNum] = useState("001");
            const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().split('T')[0]);
            const [clientName, setClientName] = useState("");
            const [year, setYear] = useState("");
            const [make, setMake] = useState("");
            const [model, setModel] = useState("");
            const [rows, setRows] = useState([initialRow()]);
            const [taxRate, setTaxRate] = useState("0");
            const [discount, setDiscount] = useState("0");
            const [notes, setNotes] = useState("");

            const addRow = () => setRows(r => [...r, initialRow()]);
            const removeRow = (id) => setRows(r => r.filter(x => x.id !== id));
            const updateRow = (id, field, val) => {
                setRows(r => r.map(x => {
                    if (x.id !== id) return x;
                    const updated = { ...x, [field]: val };
                    if (field === "selected") {
                        const svc = COMMON_SERVICES.find(s => s.label === val);
                        if (svc && svc.defaultRate > 0) updated.rate = String(svc.defaultRate);
                    }
                    return updated;
                }));
            };

            const subtotal = rows.reduce((sum, r) => sum + (parseFloat(r.rate) || 0), 0);
            const discountAmt = parseFloat(discount) || 0;
            const taxableAmount = Math.max(0, subtotal - discountAmt);
            const tax = taxableAmount * (parseFloat(taxRate) / 100 || 0);
            const total = taxableAmount + tax;
            const fmt = n => "$" + n.toFixed(2);

            const red = "#C0392B";
            const dark = "#1a1a1a";

            const inputStyle = { width: "100%", padding: "10px", borderRadius: 8, border: "1.5px solid #ddd", marginBottom: "10px" };
            const labelStyle = { fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase" };

            if (view === "preview") {
                return (
                    <div style={{ background: "#fff", minHeight: "100vh" }}>
                        <div className="no-print" style={{ display: "flex", gap: 10, padding: 20, justifyContent: "center", background: "#f0f0f0" }}>
                            <button onClick={() => setView("form")} style={{ padding: "10px 20px", borderRadius: 6 }}>← Edit</button>
                            <button onClick={() => window.print()} style={{ padding: "10px 20px", background: red, color: "#fff", border: "none", borderRadius: 6 }}>Print Invoice</button>
                        </div>

                        <div style={{ maxWidth: 700, margin: "0 auto", padding: 30 }}>
                            {/* HEADER SECTION */}
                            <div style={{ textAlign: "center", borderBottom: `4px solid ${red}`, paddingBottom: 20, marginBottom: 30 }}>
                                <h1 style={{ fontSize: 32, fontWeight: 900, color: dark }}>GERMAN AUTO SERVICE</h1>
                                <p style={{ fontSize: 14, color: "#666", marginBottom: 15 }}>(703) 980-6349 · Nasirahmad9393@gmail.com</p>
                                
                                {/* LOGO ROW */}
                                <div style={{ display: "flex", justifyContent: "center", gap: 15, alignItems: "center", flexWrap: "wrap" }}>
                                    {LOGO_LIST.map((url, i) => (
                                        <img key={i} src={url} alt="brand" style={{ height: 25, width: "auto", objectFit: "contain", opacity: 0.8 }} />
                                    ))}
                                </div>
                            </div>

                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 30 }}>
                                <div>
                                    <h2 style={{ fontSize: 24, color: red }}>INVOICE</h2>
                                    <p><b>Client:</b> {clientName}</p>
                                    <p><b>Vehicle:</b> {year} {make} {model}</p>
                                </div>
                                <div style={{ textAlign: "right" }}>
                                    <p><b>Invoice #:</b> {invoiceNum}</p>
                                    <p><b>Date:</b> {invoiceDate}</p>
                                </div>
                            </div>

                            {/* SERVICES TABLE */}
                            <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 20 }}>
                                <thead>
                                    <tr style={{ background: dark, color: "#fff" }}>
                                        <th style={{ textAlign: "left", padding: 10 }}>Service Description</th>
                                        <th style={{ textAlign: "right", padding: 10 }}>Price</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {rows.map(r => (
                                        <tr key={r.id} style={{ borderBottom: "1px solid #eee" }}>
                                            <td style={{ padding: 10 }}>{r.selected === "Custom / Other" ? r.custom : r.selected} {r.note && <small style={{display:'block', color:'#777'}}>{r.note}</small>}</td>
                                            <td style={{ textAlign: "right", padding: 10 }}>{fmt(parseFloat(r.rate) || 0)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                            {/* TOTALS */}
                            <div style={{ marginLeft: "auto", width: 250 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0" }}><span>Subtotal:</span><span>{fmt(subtotal)}</span></div>
                                {discountAmt > 0 && <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", color: red }}><span>Discount:</span><span>-{fmt(discountAmt)}</span></div>}
                                <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderTop: "1px solid #ddd", fontWeight: 700, fontSize: 18, marginTop: 5 }}><span>Total:</span><span>{fmt(total)}</span></div>
                            </div>

                            {notes && <div style={{ marginTop: 40, padding: 15, background: "#f9f9f9", borderRadius: 8 }}>
                                <b>Notes:</b><br />{notes}
                            </div>}
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ padding: "20px", maxWidth: 600, margin: "0 auto" }}>
                    <h2 style={{ textAlign: "center", color: red, marginBottom: 20 }}>Invoice Builder</h2>
                    <div style={{ background: "#fff", padding: 20, borderRadius: 10, boxShadow: "0 2px 5px rgba(0,0,0,0.1)" }}>
                        <label style={labelStyle}>Client Name</label>
                        <input style={inputStyle} value={clientName} onChange={e => setClientName(e.target.value)} />
                        
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                            <div><label style={labelStyle}>Year</label><input style={inputStyle} value={year} onChange={e => setYear(e.target.value)} /></div>
                            <div><label style={labelStyle}>Make</label><input style={inputStyle} value={make} onChange={e => setMake(e.target.value)} /></div>
                            <div><label style={labelStyle}>Model</label><input style={inputStyle} value={model} onChange={e => setModel(e.target.value)} /></div>
                        </div>

                        <h3 style={{ margin: "20px 0 10px", fontSize: 14 }}>Services</h3>
                        {rows.map(row => (
                            <div key={row.id} style={{ padding: 10, border: "1px solid #eee", borderRadius: 8, marginBottom: 10, position: 'relative' }}>
                                <select style={inputStyle} value={row.selected} onChange={e => updateRow(row.id, "selected", e.target.value)}>
                                    <option value="">Select Service</option>
                                    {COMMON_SERVICES.map(s => <option key={s.label} value={s.label}>{s.label}</option>)}
                                </select>
                                {row.selected === "Custom / Other" && <input style={inputStyle} placeholder="Service Name" onChange={e => updateRow(row.id, "custom", e.target.value)} />}
                                <input style={inputStyle} placeholder="Price" value={row.rate} onChange={e => updateRow(row.id, "rate", e.target.value)} />
                                <button onClick={() => removeRow(row.id)} style={{ color: red, border: 'none', background: 'none', fontSize: 12 }}>Remove</button>
                            </div>
                        ))}
                        <button onClick={addRow} style={{ width: "100%", padding: 10, marginBottom: 20 }}>+ Add Service</button>

                        <label style={labelStyle}>Discount ($)</label>
                        <input style={inputStyle} value={discount} onChange={e => setDiscount(e.target.value)} />

                        <label style={labelStyle}>Notes</label>
                        <textarea style={{...inputStyle, height: 80}} value={notes} onChange={e => setNotes(e.target.value)} />

                        <button onClick={() => setView("preview")} style={{ width: "100%", padding: 15, background: red, color: "#fff", border: "none", borderRadius: 8, fontWeight: 700 }}>Preview Invoice</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InvoiceApp />);
    </script>
</body>
</html>
