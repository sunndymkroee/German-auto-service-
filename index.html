<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>German Auto Service Invoice Builder</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

#root{min-height:100vh}

/* TOP BAR */
.topbar{
    background:#111;
    padding:16px;
    position:sticky;
    top:0;
    z-index:1000;
    overflow:hidden;
}

/* LOGO ANIMATION */
.logo-wrap{
    overflow:hidden;
    white-space:nowrap;
}

.logo-slider{
    display:inline-flex;
    gap:40px;
    animation:scroll 25s linear infinite;
    align-items:center;
}

.logo-slider img{
    height:32px;
    width:auto;
    object-fit:contain;
    opacity:0.95;
    filter:none;
}

@keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
}

.shop-title{
    text-align:center;
    color:white;
    font-size:26px;
    font-weight:900;
    margin-top:10px;
    letter-spacing:2px;
}

.shop-phone{
    text-align:center;
    color:#bbb;
    margin-top:5px;
    font-size:14px;
}

/* PRINT */
.print-logo-bar{
    display:flex;
    justify-content:center;
    gap:22px;
    margin-bottom:16px;
}

.print-logo-bar img{
    height:28px;
    object-fit:contain;
    filter:none;
}

@media print{
    .topbar{display:none}
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState} = React;

/* FIXED RELIABLE LOGOS */
const logos = [
"https://upload.wikimedia.org/wikipedia/commons/9/90/Mercedes-Logo.svg",
"https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg",
"https://upload.wikimedia.org/wikipedia/commons/3/3e/Audi_logo_detail.svg",
"https://upload.wikimedia.org/wikipedia/commons/7/78/Toyota_logo.svg",
"https://upload.wikimedia.org/wikipedia/commons/6/6f/Logo_of_Ford_Motor_Company.svg",
"https://upload.wikimedia.org/wikipedia/commons/c/cc/Honda-logo.svg"
];

function App(){

    const [view,setView]=useState("form");
    const [client,setClient]=useState("");
    const [phone,setPhone]=useState("");
    const [invoice,setInvoice]=useState("001");

    const [rows,setRows]=useState([
        {id:1,service:"Oil Change",rate:40}
    ]);

    const subtotal = rows.reduce((a,b)=>a+(parseFloat(b.rate)||0),0);
    const fmt = n => "$"+n.toFixed(2);

    if(view==="preview"){
        return(
            <div style={{padding:20}}>

                <button onClick={()=>setView("form")}>Back</button>
                <button onClick={()=>window.print()} style={{marginLeft:10}}>Print</button>

                <div style={{background:"#fff",marginTop:20,padding:20}}>

                    {/* PRINT LOGOS */}
                    <div className="print-logo-bar">
                        {logos.slice(0,4).map((l,i)=>(
                            <img key={i} src={l}/>
                        ))}
                    </div>

                    <h1>German Auto Service</h1>
                    <p>703-980-6349</p>

                    <h3>Invoice #{invoice}</h3>
                    <p>{client}</p>
                    <p>{phone}</p>

                    <hr/>

                    {rows.map(r=>(
                        <div key={r.id} style={{display:"flex",justifyContent:"space-between"}}>
                            <span>{r.service}</span>
                            <span>{fmt(r.rate)}</span>
                        </div>
                    ))}

                    <hr/>

                    <h3>Total: {fmt(subtotal)}</h3>

                </div>
            </div>
        );
    }

    return(
        <div>

            {/* TOP BAR */}
            <div className="topbar">

                <div className="logo-wrap">
                    <div className="logo-slider">

                        {logos.concat(logos).map((l,i)=>(
                            <img key={i} src={l}/>
                        ))}

                    </div>
                </div>

                <div className="shop-title">
                    German Auto Service
                </div>

                <div className="shop-phone">
                    703-980-6349
                </div>

            </div>

            <div style={{padding:20}}>

                <h3>Invoice #</h3>
                <input value={invoice} onChange={e=>setInvoice(e.target.value)}/>

                <h3>Client</h3>
                <input value={client} onChange={e=>setClient(e.target.value)}/>

                <h3>Phone</h3>
                <input value={phone} onChange={e=>setPhone(e.target.value)}/>

                <br/><br/>

                <button onClick={()=>setView("preview")}>
                    Preview
                </button>

            </div>

        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
