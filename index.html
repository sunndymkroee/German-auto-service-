<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Auto Invoice Builder</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Georgia', serif; background: #f7f5f2; color: #1a1a1a; }
        #root { min-height: 100vh; }
        @media print {
            body { background: white; padding: 0; }
            button { display: none !important; }
            textarea, input, select { border: none !important; background: transparent !important; appearance: none; }
            .no-print { display: none !important; }
            .invoice-card { box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LOGO_LIST = [
            "https://www.carlogos.org/logo/BMW-logo.png",
            "https://www.carlogos.org/logo/Mercedes-Benz-logo.png",
            "https://www.carlogos.org/logo/Lexus-logo.png",
            "https://www.carlogos.org/logo/Land-Rover-logo.png",
            "https://www.carlogos.org/logo/Honda-logo.png",
            "https://www.carlogos.org/logo/Toyota-logo.png"
        ];

        const COMMON_SERVICES = [
            { label: "Oil Change & Filter", defaultRate: 40 },
            { label: "Synthetic Oil Change & Filter", defaultRate: 75 },
            { label: "Brake Pad Replacement", defaultRate: 120 },
            { label: "Brake Rotor Replacement", defaultRate: 150 },
            { label: "Brake Fluid Flush", defaultRate: 60 },
            { label: "Tire Rotation", defaultRate: 25 },
            { label: "Wheel Alignment", defaultRate: 80 },
            { label: "Battery Replacement", defaultRate: 80 },
            { label: "Engine Diagnostic", defaultRate: 60 },
            { label: "A/C Recharge", defaultRate: 100 },
            { label: "Labor – General (per hour)", defaultRate: 75 },
            { label: "Custom / Other", defaultRate: 0 },
        ];

        const initialRow = () => ({
            id: Date.now() + Math.random(),
            selected: "",
            custom: "",
            rate: "",
            note: ""
        });

        function InvoiceApp() {
            const [view, setView] = useState("form");
            const [invoiceNum, setInvoiceNum] = useState("1001");
            const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().split('T')[0]);
            const [clientName, setClientName] = useState("");
            const [clientPhone, setClientPhone] = useState("");
            const [year, setYear] = useState("");
            const [make, setMake] = useState("");
            const [model, setModel] = useState("");
            const [vin, setVin] = useState("");
            const [rows, setRows] = useState([initialRow()]);
            const [discount, setDiscount] = useState("0");
            const [notes, setNotes] = useState("");

            const VA_TAX_RATE = 0.043; // Virginia State Tax (4.3%)

            const addRow = () => setRows(r => [...r, initialRow()]);
            const removeRow = (id) => setRows(r => r.filter(x => x.id !== id));
            const updateRow = (id, field, val) => {
                setRows(r => r.map(x => {
                    if (x.id !== id) return x;
                    const updated = { ...x, [field]: val };
                    if (field === "selected") {
                        const svc = COMMON_SERVICES.find(s => s.label === val);
                        if (svc && svc.defaultRate > 0) updated.rate = String(svc.defaultRate);
                    }
                    return updated;
                }));
            };

            const subtotal = rows.reduce((sum, r) => sum + (parseFloat(r.rate) || 0), 0);
            const discountAmt = parseFloat(discount) || 0;
            const taxableAmount = Math.max(0, subtotal - discountAmt);
            const taxTotal = taxableAmount * VA_TAX_RATE;
            const total = taxableAmount + taxTotal;

            const fmt = n => "$" + n.toFixed(2);

            const red = "#C0392B";
            const dark = "#1a1a1a";
            const inputStyle = { width: "100%", padding: "12px", borderRadius: 8, border: "1.5 solid #ddd", marginBottom: "10px", fontSize: "16px" };
            const labelStyle = { fontSize: 12, fontWeight: 700, color: "#555", textTransform: "uppercase", display: "block", marginBottom: "4px" };

            if (view === "preview") {
                return (
                    <div style={{ background: "#f7f5f2", minHeight: "100vh" }}>
                        <div className="no-print" style={{ display: "flex", gap: 10, padding: 20, justifyContent: "center", background: "#fff", borderBottom: "1px solid #ddd" }}>
                            <button onClick={() => setView("form")} style={{ padding: "12px 24px", borderRadius: 8, fontWeight: 600, border: "1px solid #ccc" }}>← Edit Form</button>
                            <button onClick={() => window.print()} style={{ padding: "12px 24px", background: red, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600 }}>Print / Save PDF</button>
                        </div>

                        <div className="invoice-card" style={{ maxWidth: 750, margin: "20px auto", background: "#fff", padding: "40px", boxShadow: "0 4px 10px rgba(0,0,0,0.1)" }}>
                            <div style={{ textAlign: "center", borderBottom: `4px solid ${red}`, paddingBottom: 25, marginBottom: 30 }}>
                                <h1 style={{ fontSize: 36, fontWeight: 900, color: dark, letterSpacing: "1px" }}>GERMAN AUTO SERVICE</h1>
                                <p style={{ fontSize: 14, color: "#555", marginTop: 5 }}>(703) 980-6349 · Nasirahmad9393@gmail.com</p>
                                <div style={{ display: "flex", justifyContent: "center", gap: 18, marginTop: 15, opacity: 0.8 }}>
                                    {LOGO_LIST.map((url, i) => <img key={i} src={url} style={{ height: 22 }} />)}
                                </div>
                            </div>

                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 40 }}>
                                <div>
                                    <h2 style={{ fontSize: 28, color: red, marginBottom: 10 }}>INVOICE</h2>
                                    <p><b>Client:</b> {clientName || "—"}</p>
                                    <p><b>Phone:</b> {clientPhone || "—"}</p>
                                    <p><b>Vehicle:</b> {year} {make} {model}</p>
                                    <p><b>VIN:</b> {vin || "—"}</p>
                                </div>
                                <div style={{ textAlign: "right", fontSize: 15, lineHeight: "1.8" }}>
                                    <p><b>Invoice Number:</b> #{invoiceNum}</p>
                                    <p><b>Date:</b> {invoiceDate}</p>
                                </div>
                            </div>

                            <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 30 }}>
                                <thead>
                                    <tr style={{ background: dark, color: "#fff" }}>
                                        <th style={{ textAlign: "left", padding: "12px" }}>Description</th>
                                        <th style={{ textAlign: "right", padding: "12px" }}>Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {rows.map(r => (
                                        <tr key={r.id} style={{ borderBottom: "1px solid #eee" }}>
                                            <td style={{ padding: "12px" }}>
                                                <div style={{ fontWeight: 600 }}>{r.selected === "Custom / Other" ? r.custom : r.selected}</div>
                                                {r.note && <div style={{ fontSize: 12, color: "#777" }}>{r.note}</div>}
                                            </td>
                                            <td style={{ textAlign: "right", padding: "12px", fontWeight: 600 }}>{fmt(parseFloat(r.rate) || 0)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                            <div style={{ marginLeft: "auto", width: 280 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: 14 }}>
                                    <span>Subtotal:</span><span>{fmt(subtotal)}</span>
                                </div>
                                {discountAmt > 0 && <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", color: red, fontSize: 14 }}>
                                    <span>Discount:</span><span>-{fmt(discountAmt)}</span>
                                </div>}
                                <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: 14 }}>
                                    <span>Sales Tax (VA 4.3%):</span><span>{fmt(taxTotal)}</span>
                                </div>
                                <div style={{ display: "flex", justifyContent: "space-between", padding: "15px 0", borderTop: `2px solid ${dark}`, fontWeight: 900, fontSize: 22, marginTop: 10 }}>
                                    <span>TOTAL:</span><span>{fmt(total)}</span>
                                </div>
                            </div>

                            {notes && <div style={{ marginTop: 50, padding: "20px", background: "#f9f9f9", borderRadius: 8, borderLeft: `4px solid ${red}` }}>
                                <b style={{ fontSize: 12, textTransform: "uppercase", color: "#555" }}>Notes / Work Details:</b>
                                <div style={{ marginTop: 5, whiteSpace: "pre-wrap", lineHeight: "1.6" }}>{notes}</div>
                            </div>}
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ padding: "20px 15px", maxWidth: 600, margin: "0 auto" }}>
                    <div style={{ textAlign: "center", marginBottom: 25 }}>
                        <h2 style={{ color: red, fontSize: 24, fontWeight: 900 }}>GERMAN AUTO SERVICE</h2>
                        <p style={{ fontSize: 13, color: "#666" }}>Invoice Builder</p>
                    </div>

                    <div style={{ background: "#fff", padding: "20px", borderRadius: 12, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
                        
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "15px", marginBottom: "20px", paddingBottom: "20px", borderBottom: "1px solid #eee" }}>
                            <div>
                                <label style={labelStyle}>Invoice #</label>
                                <input style={inputStyle} value={invoiceNum} onChange={e => setInvoiceNum(e.target.value)} />
                            </div>
                            <div>
                                <label style={labelStyle}>Date</label>
                                <input type="date" style={inputStyle} value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)} />
                            </div>
                        </div>

                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "15px" }}>
                            <div>
                                <label style={labelStyle}>Customer Name</label>
                                <input style={inputStyle} placeholder="John Doe" value={clientName} onChange={e => setClientName(e.target.value)} />
                            </div>
                            <div>
                                <label style={labelStyle}>Phone Number</label>
                                <input style={inputStyle} placeholder="(555) 555-5555" value={clientPhone} onChange={e => setClientPhone(e.target.value)} />
                            </div>
                        </div>
                        
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px" }}>
                            <div><label style={labelStyle}>Year</label><input style={inputStyle} placeholder="2022" value={year} onChange={e => setYear(e.target.value)} /></div>
                            <div><label style={labelStyle}>Make</label><input style={inputStyle} placeholder="BMW" value={make} onChange={e => setMake(e.target.value)} /></div>
                            <div><label style={labelStyle}>Model</label><input style={inputStyle} placeholder="X5" value={model} onChange={e => setModel(e.target.value)} /></div>
                        </div>
                        <div style={{ marginTop: "10px" }}>
                            <label style={labelStyle}>VIN Number</label>
                            <input style={inputStyle} placeholder="17-character VIN" value={vin} onChange={e => setVin(e.target.value)} />
                        </div>

                        <h3 style={{ margin: "20px 0 10px", fontSize: 13, color: red, textTransform: "uppercase", fontWeight: 800 }}>Services & Labor</h3>
                        {rows.map((row, idx) => (
                            <div key={row.id} style={{ padding: "15px", background: "#fcfcfc", border: "1px solid #eee", borderRadius: 10, marginBottom: "15px" }}>
                                <label style={labelStyle}>Select Service</label>
                                <select style={inputStyle} value={row.selected} onChange={e => updateRow(row.id, "selected", e.target.value)}>
                                    <option value="">— Choose —</option>
                                    {COMMON_SERVICES.map(s => <option key={s.label} value={s.label}>{s.label}</option>)}
                                </select>
                                {row.selected === "Custom / Other" && <input style={inputStyle} placeholder="Enter service name..." onChange={e => updateRow(row.id, "custom", e.target.value)} />}
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                                    <div><label style={labelStyle}>Price ($)</label><input style={inputStyle} value={row.rate} onChange={e => updateRow(row.id, "rate", e.target.value)} /></div>
                                    <div><label style={labelStyle}>Job Note</label><input style={inputStyle} placeholder="e.g. Front axle" value={row.note} onChange={e => updateRow(row.id, "note", e.target.value)} /></div>
                                </div>
                                {rows.length > 1 && <button onClick={() => removeRow(row.id)} style={{ color: red, background: "none", border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Remove Service</button>}
                            </div>
                        ))}
                        <button onClick={addRow} style={{ width: "100%", padding: "12px", borderRadius: 8, background: "#fff", border: "2px dashed #ddd", color: "#888", fontWeight: 700, marginBottom: "20px" }}>+ Add Another Service</button>

                        <label style={labelStyle}>Discount Amount ($)</label>
                        <input style={inputStyle} placeholder="0.00" value={discount} onChange={e => setDiscount(e.target.value)} />

                        <div style={{ background: "#f9f9f9", padding: "15px", borderRadius: 8, marginBottom: "20px" }}>
                           <div style={{ display: "flex", justifyContent: "space-between", fontSize: "14px" }}><span>Subtotal:</span><span>{fmt(subtotal)}</span></div>
                           <div style={{ display: "flex", justifyContent: "space-between", fontSize: "14px", marginTop: "5px" }}><span>VA Tax (4.3%):</span><span>{fmt(taxTotal)}</span></div>
                           <div style={{ display: "flex", justifyContent: "space-between", fontWeight: "700", marginTop: "5px", borderTop: "1px solid #ddd", paddingTop: "5px" }}><span>Estimated Total:</span><span>{fmt(total)}</span></div>
                        </div>

                        <label style={labelStyle}>Additional Notes</label>
                        <textarea style={{ ...inputStyle, height: "100px" }} placeholder="Warranty info, parts details, etc." value={notes} onChange={e => setNotes(e.target.value)} />

                        <button onClick={() => setView("preview")} style={{ width: "100%", padding: "18px", background: red, color: "#fff", border: "none", borderRadius: 10, fontSize: 18, fontWeight: 800, marginTop: "10px" }}>Preview & Print →</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InvoiceApp />);
    </script>
</body>
</html>
