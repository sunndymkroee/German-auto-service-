<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Service Invoice Builder</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: 'Georgia', serif;
            background: #f5f5f5;
            color: #1a1a1a;
        }
        #root {
            min-height: 100vh;
        }
        @media print {
            body {
                background: white;
            }
            button {
                display: none !important;
            }
            textarea, input, select {
                border: none !important;
                background: transparent !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const COMMON_SERVICES = [
            { label: "Oil Change & Filter", defaultRate: 40 },
            { label: "Synthetic Oil Change & Filter", defaultRate: 75 },
            { label: "Brake Pad Replacement (Front)", defaultRate: 120 },
            { label: "Brake Pad Replacement (Rear)", defaultRate: 120 },
            { label: "Brake Rotor Replacement (Front)", defaultRate: 150 },
            { label: "Brake Rotor Replacement (Rear)", defaultRate: 150 },
            { label: "Brake Fluid Flush", defaultRate: 60 },
            { label: "Tire Rotation", defaultRate: 25 },
            { label: "Tire Mounting & Balancing (each)", defaultRate: 20 },
            { label: "Wheel Alignment", defaultRate: 80 },
            { label: "Battery Replacement", defaultRate: 80 },
            { label: "Battery Test & Charge", defaultRate: 20 },
            { label: "Alternator Replacement", defaultRate: 200 },
            { label: "Starter Replacement", defaultRate: 180 },
            { label: "Spark Plug Replacement", defaultRate: 80 },
            { label: "Air Filter Replacement", defaultRate: 25 },
            { label: "Cabin Air Filter Replacement", defaultRate: 30 },
            { label: "Fuel Filter Replacement", defaultRate: 60 },
            { label: "Coolant Flush & Refill", defaultRate: 80 },
            { label: "Radiator Replacement", defaultRate: 300 },
            { label: "Thermostat Replacement", defaultRate: 120 },
            { label: "Water Pump Replacement", defaultRate: 250 },
            { label: "Power Steering Fluid Flush", defaultRate: 55 },
            { label: "Power Steering Pump Replacement", defaultRate: 280 },
            { label: "Transmission Fluid Change", defaultRate: 100 },
            { label: "CV Axle Replacement", defaultRate: 200 },
            { label: "Strut / Shock Replacement (each)", defaultRate: 180 },
            { label: "Serpentine Belt Replacement", defaultRate: 90 },
            { label: "Timing Belt Replacement", defaultRate: 400 },
            { label: "Head Gasket Repair", defaultRate: 1200 },
            { label: "Engine Diagnostic / Scan", defaultRate: 60 },
            { label: "Check Engine Light Diagnosis", defaultRate: 60 },
            { label: "A/C Recharge", defaultRate: 100 },
            { label: "A/C Compressor Replacement", defaultRate: 500 },
            { label: "Exhaust Repair / Weld", defaultRate: 150 },
            { label: "Catalytic Converter Replacement", defaultRate: 600 },
            { label: "Oxygen Sensor Replacement", defaultRate: 100 },
            { label: "Window Regulator Replacement", defaultRate: 150 },
            { label: "Windshield Wiper Replacement", defaultRate: 25 },
            { label: "Labor – General (per hour)", defaultRate: 75 },
            { label: "Parts (specify in description)", defaultRate: 0 },
            { label: "Custom / Other", defaultRate: 0 },
        ];

        const CAR_BRANDS = [
            { name: "Honda", color: "#DC2E3E", logo: "🏛️" },
            { name: "Toyota", color: "#EB0A1E", logo: "🔷" },
            { name: "Ford", color: "#003478", logo: "🅵" },
            { name: "BMW", color: "#0066B2", logo: "⭕" },
            { name: "Mercedes", color: "#00A651", logo: "⭐" },
        ];

        const initialRow = () => ({
            id: Date.now() + Math.random(),
            selected: "",
            custom: "",
            qty: "1",
            rate: "",
            note: ""
        });

        function InvoiceApp() {
            const [view, setView] = useState("form");
            const [invoiceNum, setInvoiceNum] = useState("001");
            const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().split('T')[0]);
            const [dueDate, setDueDate] = useState(new Date().toISOString().split('T')[0]);
            const [clientName, setClientName] = useState("");
            const [clientPhone, setClientPhone] = useState("");
            const [mechanicName, setMechanicName] = useState("");
            const [year, setYear] = useState("");
            const [make, setMake] = useState("");
            const [model, setModel] = useState("");
            const [color, setColor] = useState("");
            const [mileage, setMileage] = useState("");
            const [plate, setPlate] = useState("");
            const [vin, setVin] = useState("");
            const [rows, setRows] = useState([initialRow()]);
            const [taxRate, setTaxRate] = useState("0");
            const [notes, setNotes] = useState("");
            const previewRef = useRef(null);

            const addRow = () => setRows(r => [...r, initialRow()]);
            const removeRow = (id) => setRows(r => r.filter(x => x.id !== id));

            const updateRow = (id, field, val) => {
                setRows(r => r.map(x => {
                    if (x.id !== id) return x;
                    const updated = { ...x, [field]: val };
                    if (field === "selected") {
                        const svc = COMMON_SERVICES.find(s => s.label === val);
                        if (svc && svc.defaultRate > 0) updated.rate = String(svc.defaultRate);
                        if (val !== "Custom / Other") updated.custom = "";
                    }
                    return updated;
                }));
            };

            const subtotal = rows.reduce((sum, r) => sum + (parseFloat(r.rate) || 0), 0);
            const tax = subtotal * (parseFloat(taxRate) / 100 || 0);
            const total = subtotal + tax;
            const fmt = n => "$" + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");

            const primaryColor = "#1e3a8a";
            const accentColor = "#dc2626";
            const lightBg = "#f3f4f6";
            const dark = "#111827";

            const inputStyle = {
                width: "100%",
                padding: "10px 12px",
                borderRadius: 8,
                border: "1.5px solid #e5e7eb",
                fontSize: 15,
                background: "#fff",
                color: dark,
                outline: "none",
                boxSizing: "border-box",
                fontFamily: "'Georgia', serif",
            };

            const labelStyle = {
                fontSize: 11,
                fontWeight: 700,
                color: "#6b7280",
                letterSpacing: "0.08em",
                textTransform: "uppercase",
                marginBottom: 4,
                display: "block",
            };

            const sectionTitle = {
                fontSize: 11,
                fontWeight: 800,
                letterSpacing: "0.15em",
                color: "#fff",
                background: primaryColor,
                padding: "10px 16px",
                borderRadius: 6,
                marginBottom: 12,
                textTransform: "uppercase",
                display: "inline-block",
            };

            const getBrandColor = () => {
                const brand = CAR_BRANDS.find(b => b.name.toLowerCase() === make.toLowerCase());
                return brand ? brand.color : accentColor;
            };

            if (view === "preview") {
                return (
                    <div style={{ minHeight: "100vh", background: lightBg, fontFamily: "'Georgia', serif" }}>
                        <div style={{ maxWidth: 700, margin: "0 auto", padding: "0 0 40px 0" }}>
                            <div style={{ display: "flex", gap: 10, padding: "16px 16px 0", justifyContent: "space-between" }}>
                                <button onClick={() => setView("form")} style={{ padding: "10px 20px", background: "#fff", border: "1px solid #d1d5db", borderRadius: 6, cursor: "pointer", fontSize: 14, fontWeight: 600, color: dark }}>← Back to Edit</button>
                                <button onClick={() => window.print()} style={{ padding: "10px 20px", background: accentColor, color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 14, fontWeight: 600 }}>🖨️ Print</button>
                            </div>

                            <div ref={previewRef} style={{ background: "#fff", margin: 16, borderRadius: 12, overflow: "hidden", boxShadow: "0 10px 25px rgba(0,0,0,0.08)" }}>
                                <div style={{ background: getBrandColor(), padding: "32px 28px", textAlign: "center", position: "relative" }}>
                                    <div style={{ fontSize: 60, marginBottom: 8 }}>
                                        {make === "Honda" && "🏛️"}
                                        {make === "Toyota" && "🔷"}
                                        {make === "Ford" && "🅵"}
                                        {make === "BMW" && "⭕"}
                                        {make === "Mercedes" && "⭐"}
                                        {!make && "🔧"}
                                    </div>
                                    <div style={{ fontSize: 28, fontWeight: 900, color: "#fff", letterSpacing: "-0.01em", marginBottom: 8 }}>
                                        {year && `${year} `}{make && `${make} `}{model && model}
                                    </div>
                                    <div style={{ color: "rgba(255,255,255,0.9)", fontSize: 14, fontWeight: 600 }}>Auto Service Invoice</div>
                                    {mechanicName && <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 12, marginTop: 4 }}>Mechanic: {mechanicName}</div>}
                                    <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 12, marginTop: 8 }}>(703) 980-6349</div>
                                </div>

                                <div style={{ padding: "28px 28px" }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
                                        <div style={{ fontSize: 36, fontWeight: 900, color: dark, letterSpacing: "-0.02em" }}>INVOICE</div>
                                        <div style={{ background: lightBg, borderRadius: 8, padding: "14px 18px", fontSize: 12, lineHeight: 1.8, borderLeft: `4px solid ${getBrandColor()}` }}>
                                            <div style={{ fontWeight: 700, color: primaryColor }}>INV #{invoiceNum || "001"}</div>
                                            <div style={{ color: "#6b7280", marginTop: 4 }}>
                                                <b>Date:</b> {invoiceDate || "—"}<br />
                                                <b>Due:</b> {dueDate || "—"}
                                            </div>
                                        </div>
                                    </div>

                                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
                                        <div style={{ background: lightBg, borderRadius: 8, padding: "16px 18px" }}>
                                            <div style={{ fontSize: 10, fontWeight: 800, color: accentColor, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Shop Details</div>
                                            <div style={{ fontWeight: 700, fontSize: 14, color: dark }}>Auto Service</div>
                                            <div style={{ fontSize: 12, color: "#6b7280", marginTop: 6, lineHeight: 1.6 }}>(703) 980-6349</div>
                                        </div>
                                        <div style={{ borderLeft: `4px solid ${getBrandColor()}`, background: "#fafafa", borderRadius: 8, padding: "16px 18px" }}>
                                            <div style={{ fontSize: 10, fontWeight: 800, color: accentColor, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Billed To</div>
                                            <div style={{ fontWeight: 700, fontSize: 14, color: dark }}>{clientName || "Client Name"}</div>
                                            <div style={{ fontSize: 12, color: "#6b7280", marginTop: 6, lineHeight: 1.6 }}>
                                                {clientPhone && <>{clientPhone}</>}
                                            </div>
                                        </div>
                                    </div>

                                    {(year || make || model || plate) && (
                                        <div style={{ background: lightBg, borderRadius: 8, padding: "16px 18px", marginBottom: 24 }}>
                                            <div style={{ fontSize: 10, fontWeight: 800, color: accentColor, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10 }}>Vehicle Information</div>
                                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, fontSize: 12 }}>
                                                {year && <div><span style={{ fontWeight: 700, color: primaryColor }}>Year:</span> <span style={{ color: "#374151" }}>{year}</span></div>}
                                                {make && <div><span style={{ fontWeight: 700, color: primaryColor }}>Make:</span> <span style={{ color: "#374151" }}>{make}</span></div>}
                                                {model && <div><span style={{ fontWeight: 700, color: primaryColor }}>Model:</span> <span style={{ color: "#374151" }}>{model}</span></div>}
                                                {color && <div><span style={{ fontWeight: 700, color: primaryColor }}>Color:</span> <span style={{ color: "#374151" }}>{color}</span></div>}
                                                {mileage && <div><span style={{ fontWeight: 700, color: primaryColor }}>Mileage:</span> <span style={{ color: "#374151" }}>{mileage}</span></div>}
                                                {plate && <div><span style={{ fontWeight: 700, color: primaryColor }}>Plate:</span> <span style={{ color: "#374151" }}>{plate}</span></div>}
                                                {vin && <div><span style={{ fontWeight: 700, color: primaryColor }}>VIN:</span> <span style={{ color: "#374151" }}>{vin}</span></div>}
                                            </div>
                                        </div>
                                    )}

                                    <div style={{ borderRadius: 8, overflow: "hidden", border: "1px solid #e5e7eb", marginBottom: 24 }}>
                                        <div style={{ display: "grid", gridTemplateColumns: "1fr 100px", background: primaryColor, color: "#fff", fontWeight: 700, fontSize: 11, letterSpacing: "0.08em", padding: "12px 16px", textTransform: "uppercase" }}>
                                            <span>Service Description</span>
                                            <span style={{ textAlign: "right" }}>Amount</span>
                                        </div>
                                        {rows.filter(r => r.selected || r.custom).map((r, i) => {
                                            const label = r.selected === "Custom / Other" ? r.custom : r.selected;
                                            const price = parseFloat(r.rate) || 0;
                                            return (
                                                <div key={r.id} style={{ display: "grid", gridTemplateColumns: "1fr 100px", padding: "14px 16px", borderBottom: i < rows.filter(rr => rr.selected || rr.custom).length - 1 ? "1px solid #f3f4f6" : "none", alignItems: "center", background: i % 2 === 0 ? "#fafafa" : "#fff" }}>
                                                    <div>
                                                        <div style={{ fontWeight: 600, color: dark }}>{label || "—"}</div>
                                                        {r.note && <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 3 }}>{r.note}</div>}
                                                    </div>
                                                    <div style={{ textAlign: "right", fontWeight: 700, color: primaryColor, fontSize: 13 }}>{price ? fmt(price) : "—"}</div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 20 }}>
                                        <div style={{ width: 250 }}>
                                            <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontSize: 12, color: "#6b7280", borderBottom: "1px solid #e5e7eb", paddingBottom: 12, marginBottom: 12 }}>
                                                <span>Subtotal</span>
                                                <span style={{ fontWeight: 600 }}>{fmt(subtotal)}</span>
                                            </div>
                                            {parseFloat(taxRate) > 0 && (
                                                <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontSize: 12, color: "#6b7280", marginBottom: 12 }}>
                                                    <span>Tax ({taxRate}%)</span>
                                                    <span style={{ fontWeight: 600 }}>{fmt(tax)}</span>
                                                </div>
                                            )}
                                            <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", fontSize: 16, fontWeight: 900, color: "#fff", background: getBrandColor(), padding: "12px 14px", borderRadius: 6 }}>
                                                <span>TOTAL DUE</span>
                                                <span>{fmt(total)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {notes && (
                                        <div style={{ background: lightBg, borderRadius: 8, padding: "16px 18px", marginBottom: 20 }}>
                                            <div style={{ fontSize: 10, fontWeight: 800, color: accentColor, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Notes & Work Details</div>
                                            <div style={{ color: "#374151", fontSize: 12, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{notes}</div>
                                        </div>
                                    )}

                                    <div style={{ textAlign: "center", borderTop: `2px solid ${lightBg}`, paddingTop: 20, marginTop: 20 }}>
                                        <div style={{ fontWeight: 700, color: primaryColor, fontSize: 12 }}>Thank You For Your Business! ✓</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ minHeight: "100vh", background: lightBg, fontFamily: "'Georgia', serif", padding: "20px 0 40px" }}>
                    <div style={{ background: primaryColor, padding: "24px 20px", textAlign: "center", position: "sticky", top: 0, zIndex: 10, boxShadow: "0 4px 12px rgba(0,0,0,0.1)" }}>
                        <div style={{ fontSize: 24, fontWeight: 900, color: "#fff", letterSpacing: "0.06em" }}>🔧 INVOICE BUILDER</div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.85)", marginTop: 4 }}>Professional Auto Service Invoicing</div>
                    </div>

                    <div style={{ maxWidth: 620, margin: "0 auto", padding: "20px 16px" }}>
                        <div style={{ background: "#fff", borderRadius: 12, padding: "20px 16px", marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
                            <div style={sectionTitle}>Invoice Info</div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 8 }}>
                                <div>
                                    <label style={labelStyle}>Invoice #</label>
                                    <input style={inputStyle} value={invoiceNum} onChange={e => setInvoiceNum(e.target.value)} />
                                </div>
                                <div>
                                    <label style={labelStyle}>Date</label>
                                    <input style={inputStyle} type="date" value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)} />
                                </div>
                                <div>
                                    <label style={labelStyle}>Due Date</label>
                                    <input style={inputStyle} type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} />
                                </div>
                            </div>
                        </div>

                        <div style={{ background: "#fff", borderRadius: 12, padding: "20px 16px", marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
                            <div style={sectionTitle}>Mechanic & Client Info</div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 8 }}>
                                <div>
                                    <label style={labelStyle}>Mechanic Name</label>
                                    <input style={inputStyle} value={mechanicName} onChange={e => setMechanicName(e.target.value)} placeholder="Your name" />
                                </div>
                                <div>
                                    <label style={labelStyle}>Client Name</label>
                                    <input style={inputStyle} value={clientName} onChange={e => setClientName(e.target.value)} placeholder="Customer name" />
                                </div>
                                <div>
                                    <label style={labelStyle}>Client Phone</label>
                                    <input style={inputStyle} value={clientPhone} onChange={e => setClientPhone(e.target.value)} placeholder="(555) 123-4567" />
                                </div>
                            </div>
                        </div>

                        <div style={{ background: "#fff", borderRadius: 12, padding: "20px 16px", marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
                            <div style={sectionTitle}>Vehicle Info</div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 8 }}>
                                {[["Year", year, setYear, "2020"], ["Make", make, setMake, "Honda"], ["Model", model, setModel, "Civic"], ["Color", color, setColor, "White"]].map(([lbl, val, fn, placeholder]) => (
                                    <div key={lbl}>
                                        <label style={labelStyle}>{lbl}</label>
                                        <input style={inputStyle} value={val} onChange={e => fn(e.target.value)} placeholder={placeholder} />
                                    </div>
                                ))}
                            </div>
                            <div style={{ marginTop: 12 }}>
                                <label style={labelStyle}>Mileage</label>
                                <input style={inputStyle} value={mileage} onChange={e => setMileage(e.target.value)} placeholder="95,000" />
                            </div>
                            <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                                <div>
                                    <label style={labelStyle}>License Plate</label>
                                    <input style={inputStyle} value={plate} onChange={e => setPlate(e.target.value)} placeholder="ABC1234" />
                                </div>
                                <div>
                                    <label style={labelStyle}>VIN (last 6 digits)</label>
                                    <input style={inputStyle} value={vin} onChange={e => setVin(e.target.value)} placeholder="123ABC" />
                                </div>
                            </div>
                        </div>

                        <div style={{ background: "#fff", borderRadius: 12, padding: "20px 16px", marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
                            <div style={sectionTitle}>Services</div>
                            <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 14 }}>
                                {rows.map((row, idx) => (
                                    <div key={row.id} style={{ background: lightBg, borderRadius: 10, padding: "14px", position: "relative", border: "1px solid #e5e7eb" }}>
                                        <div style={{ fontSize: 11, fontWeight: 700, color: accentColor, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Service {idx + 1}</div>
                                        <label style={labelStyle}>Select Service</label>
                                        <select style={{ ...inputStyle, appearance: "auto", marginBottom: 12, background: "#fff" }} value={row.selected} onChange={e => updateRow(row.id, "selected", e.target.value)}>
                                            <option value="">— Choose a service —</option>
                                            {COMMON_SERVICES.map(s => <option key={s.label} value={s.label}>{s.label}</option>)}
                                        </select>
                                        {row.selected === "Custom / Other" && (
                                            <>
                                                <label style={labelStyle}>Describe the service</label>
                                                <input style={{ ...inputStyle, marginBottom: 12 }} value={row.custom} onChange={e => updateRow(row.id, "custom", e.target.value)} placeholder="e.g., Custom repair work..." />
                                            </>
                                        )}
                                        <label style={labelStyle}>Notes (optional)</label>
                                        <input style={{ ...inputStyle, marginBottom: 12, fontSize: 13 }} value={row.note} onChange={e => updateRow(row.id, "note", e.target.value)} placeholder="Any notes for this service?" />
                                        <div>
                                            <label style={labelStyle}>Price ($)</label>
                                            <input style={inputStyle} value={row.rate} onChange={e => updateRow(row.id, "rate", e.target.value)} placeholder="0.00" />
                                        </div>
                                        {rows.length > 1 && (
                                            <button onClick={() => removeRow(row.id)} style={{ position: "absolute", top: 10, right: 10, background: "#fff", border: "1px solid #e5e7eb", borderRadius: 50, width: 32, height: 32, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", color: accentColor, fontWeight: 700 }}>✕</button>
                                        )}
                                    </div>
                                ))}
                                <button onClick={addRow} style={{ padding: "12px", background: "none", border: `2px dashed #d1d5db`, borderRadius: 8, cursor: "pointer", color: "#6b7280", fontWeight: 600, fontSize: 14, transition: "all 0.2s" }} onMouseEnter={e => { e.target.style.borderColor = accentColor; e.target.style.color = accentColor; }} onMouseLeave={e => { e.target.style.borderColor = "#d1d5db"; e.target.style.color = "#6b7280"; }}>+ Add Another Service</button>
                            </div>
                        </div>

                        <div style={{ background: "#fff", borderRadius: 12, padding: "20px 16px", marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
                            <div style={sectionTitle}>Totals & Notes</div>
                            <div style={{ marginTop: 8 }}>
                                <label style={labelStyle}>Tax Rate (% — enter 0 if none)</label>
                                <input style={{ ...inputStyle, marginBottom: 16 }} value={taxRate} onChange={e => setTaxRate(e.target.value)} placeholder="0" />
                                <div style={{ background: lightBg, borderRadius: 8, padding: "14px 16px", marginBottom: 16, border: "1px solid #e5e7eb" }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#6b7280", paddingBottom: 8, borderBottom: "1px solid #d1d5db", marginBottom: 8 }}>
                                        <span>Subtotal</span>
                                        <span style={{ fontWeight: 700, color: primaryColor }}>{fmt(subtotal)}</span>
                                    </div>
                                    {parseFloat(taxRate) > 0 && (
                                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#6b7280", paddingBottom: 8, marginBottom: 8 }}>
                                            <span>Tax ({taxRate}%)</span>
                                            <span style={{ fontWeight: 700, color: primaryColor }}>{fmt(tax)}</span>
                                        </div>
                                    )}
                                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 15, fontWeight: 900, color: "#fff", background: primaryColor, padding: "10px 12px", borderRadius: 4 }}>
                                        <span>TOTAL</span>
                                        <span>{fmt(total)}</span>
                                    </div>
                                </div>
                                <label style={labelStyle}>Notes / Work Performed</label>
                                <textarea style={{ ...inputStyle, minHeight: 90, resize: "vertical" }} value={notes} onChange={e => setNotes(e.target.value)} placeholder="Describe work done, parts used, warranty info, anything the client should know..." />
                            </div>
                        </div>

                        <button onClick={() => setView("preview")} style={{ width: "100%", padding: "16px", background: accentColor, color: "#fff", border: "none", borderRadius: 8, fontSize: 16, fontWeight: 700, cursor: "pointer", transition: "all 0.2s", boxShadow: "0 4px 12px rgba(220, 38, 38, 0.2)" }} onMouseEnter={e => e.target.style.transform = "translateY(-2px)"} onMouseLeave={e => e.target.style.transform = "translateY(0)"}>Preview & Print Invoice →</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InvoiceApp />);
    </script>
</body>
</html>
